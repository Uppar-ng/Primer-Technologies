<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Page Not Found | Zaure</title>
    <meta name="description" content="The page you are looking for does not exist.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A1F2E;
            --primary-soft: #2E3548;
            --accent: #B49450;
            --accent-soft: #D4B87A;
            --bg: #FBFBFB;
            --surface: #FFFFFF;
            --text: #1E1E1E;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow-lg: 0 12px 24px -8px rgba(0,0,0,0.06);
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="dark"] {
            --primary: #D4B87A;
            --accent: #D4B87A;
            --bg: #0B1120;
            --surface: #131C31;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --border: #2A3550;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height:1.6;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 600px; padding: 2rem; }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .btn-primary {
            background: var(--accent);
            color: #1A1F2E;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary:hover {
            background: var(--accent-soft);
        }
    </style>
    
    <!-- Vercel Speed Insights -->
    <script type="module">
        import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2/dist/index.mjs';
        injectSpeedInsights();
    </script>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-icon"><i class="fas fa-archway"></i></div>
        <h1>Lost in the Zaure?</h1>
        <p>This entrance leads nowhere. The page you're looking for has moved or doesn't exist.</p>
        <a href="/" class="btn-primary"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
